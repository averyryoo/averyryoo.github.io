<!-- Travel Photo Modal -->
<div id="travel-modal" class="travel-modal" role="dialog" aria-modal="true" aria-labelledby="modal-title" hidden>
  <div class="travel-modal__backdrop"></div>
  <div class="travel-modal__content">
    <button class="travel-modal__close" aria-label="Close modal">&times;</button>
    <h2 id="modal-title" class="travel-modal__title"></h2>
    <p class="travel-modal__year"></p>
    <p class="travel-modal__caption"></p>
    <div class="travel-modal__gallery">
      <button class="travel-modal__nav travel-modal__nav--prev" aria-label="Previous photo">&#8249;</button>
      <div class="travel-modal__photo-container">
        <img class="travel-modal__photo" src="" alt="">
      </div>
      <button class="travel-modal__nav travel-modal__nav--next" aria-label="Next photo">&#8250;</button>
    </div>
    <div class="travel-modal__dots"></div>
  </div>
</div>
