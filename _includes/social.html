<div class="social-block">
  <div class="social-links" aria-label="Social links">
    {% for social in site.data.social %}
    <a class="social-link {{ social.platform }}" href="{{ social.url }}" aria-label="{{ social.label }}"{% if social.platform != 'email' %} target="_blank" rel="noreferrer"{% endif %} style="--accent: {{ social.accent }}">
      {% if social.icon_type == 'svg' %}
      <svg class="social-icon" viewBox="0 0 24 24" aria-hidden="true">
        <rect x="3" y="5" width="18" height="14" rx="2.2" ry="2.2"></rect>
        <path d="M4 7.5 12 12.5 20 7.5"></path>
        <path d="M4 17l4.5-3.2"></path>
        <path d="M20 17 15.5 13.8"></path>
      </svg>
      {% else %}
      <img class="social-icon-img" src="{{ social.icon_src }}" alt="">
      {% endif %}
    </a>
    {% endfor %}
  </div>
</div>
